openapi: 3.0.0
info:
  title: Payments Service API
  version: 1.0.0
  description: REST API for creating and retrieving payments.
paths:
  /payments:
    post:
      operationId: createPayment
      summary: Create a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer }
                currency: { type: string }
              required: [amount, currency]
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string }
  /payments/{id}:
    get:
      operationId: getPayment
      summary: Fetch a payment by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Payment found
